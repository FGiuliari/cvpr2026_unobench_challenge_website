{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Submit Challenge Results</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="result_json" class="form-label">Upload JSONL Result File</label>
                        <input class="form-control" type="file" id="result_json" name="result_json" accept=".jsonl" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_public" name="is_public" checked>
                        <label class="form-check-label" for="is_public">Make submission public on Leaderboard</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit to Evaluate</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
